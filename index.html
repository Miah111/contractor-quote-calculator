<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Contractor Quote Calculator</title>
   
    <link rel="stylesheet" href="style.css">
  </head>

    <body>
      <div class="container">
        <h1>Contractor Quote Calculator</h1>
        <label>Customer Name</label>
        <input type="text" id="customerName" placeholder="Enter customer name">

        <label>Project Address</label>
        <input type="text" id="address" placeholder="Enter project address">

        <label>Project Description</label>
        <input type="text" id="description" placholder="Example: Basement drywall">

        <label>Square Footage</label>
        <input type="number" id="squareFeet" placeholder="Enter square footage">

        
        <label>Job Type</label>
        <select id="jobType">
          <option value="2">Drywall ($2 per sq ft)</option>
          <option value="3">Roofing ($3 per sq ft)</option>
          <option value="4">Framing ($4 per sq ft)</option>
        </select>

        <label>Labor Rate (per hour)</label>
        <input type="number" id="laborRate" placeholder="Enter labor rate">

        <label>Estimated Labor Hours</label>
        <input type="number" id="laborHours" placeholder="Enter labor hours">

        <label>Material Cost ($)</label>
        <input type="number" id="materials" placeholder="Enter material cost">

        <label>Profit Margin (%)</label>
        <input type="number" id="profit" placeholder="Enter profit percentage">

        <label>Tax (%)</label>
        <input type="number" id="tax" placeholder="Enter tax percentage">

        <button onclick="calculateQuote()">Calculate Quote</button>
        <h2 id="result">Total: $0</h2>
        <div id="breakdown"></div>
      </div>
     
      <script src="script.js"></script>
    </body>
</html>
